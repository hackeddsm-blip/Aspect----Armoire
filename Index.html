<!DOCTYPE html>
<html lang="fr">
<link rel="icon" type="image/png" href="Logo.png">
<link rel="apple-touch-icon" href="logo.png">
<meta name="theme-color" content="#000000">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Armoire - Garde-robe Numérique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F5F5F7;
            -webkit-tap-highlight-color: transparent;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Animations */
        @keyframes door-left { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(-110deg); } }
        @keyframes door-right { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(110deg); } }
        @keyframes wardrobe-zoom {
            0% { transform: scale(0.8); opacity: 1; }
            60% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; visibility: hidden; }
        }
        @keyframes content-fade { 40% { opacity: 0; } 100% { opacity: 1; } }

        .perspective-1000 { perspective: 1000px; }
        .animate-door-left { animation: door-left 1.5s forwards 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .animate-door-right { animation: door-right 1.5s forwards 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .animate-wardrobe-zoom { animation: wardrobe-zoom 2.5s forwards; }
        .animate-content-fade { animation: content-fade 1.5s forwards 0.5s; }

        .modal-enter { animation: zoomIn 0.3s ease-out; }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="selection:bg-black selection:text-white">

    <!-- ÉCRAN DE CHARGEMENT -->
    <div id="loading-screen" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-[200]">
        <div class="relative w-48 h-64 perspective-1000 animate-wardrobe-zoom">
            <div class="absolute inset-0 bg-zinc-900 rounded-lg shadow-2xl border-4 border-zinc-800"></div>
            <div class="absolute inset-y-0 left-0 w-1/2 bg-zinc-800 border-r border-zinc-700 rounded-l-lg origin-left animate-door-left shadow-lg flex items-center justify-end pr-2">
                <div class="w-1 h-8 bg-amber-600 rounded-full"></div>
            </div>
            <div class="absolute inset-y-0 right-0 w-1/2 bg-zinc-800 border-l border-zinc-700 rounded-r-lg origin-right animate-door-right shadow-lg flex items-center justify-start pl-2">
                <div class="w-1 h-8 bg-amber-600 rounded-full"></div>
            </div>
            <div class="absolute inset-4 flex flex-col gap-2 items-center justify-center opacity-0 animate-content-fade text-zinc-600">
                <div class="w-12 h-1 bg-zinc-700 rounded-full"></div>
                <i data-lucide="shirt" class="w-10 h-10"></i>
                <div class="w-16 h-1 bg-zinc-700 rounded-full"></div>
            </div>
        </div>
        <h1 class="mt-12 text-2xl font-black tracking-[0.2em] text-zinc-900 animate-pulse uppercase">L'ARMOIRE</h1>
        <p class="text-zinc-400 mt-2 text-sm italic">Sauvegarde automatique active</p>
    </div>

    <!-- HEADER -->
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-zinc-100">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center text-white">
                    <i data-lucide="layout-grid" class="w-5 h-5"></i>
                </div>
                <h1 class="text-lg font-black tracking-tighter">L'ARMOIRE</h1>
            </div>
            <div class="flex items-center space-x-4">
                <nav class="hidden md:flex items-center space-x-1 bg-zinc-100 p-1 rounded-full">
                    <button onclick="switchTab('inventory')" id="btn-inventory" class="px-4 py-1.5 rounded-full text-xs font-bold transition-all bg-white shadow-sm text-black uppercase">VÊTEMENTS</button>
                    <button onclick="switchTab('outfits')" id="btn-outfits" class="px-4 py-1.5 rounded-full text-xs font-bold transition-all text-zinc-500 uppercase">TENUES</button>
                </nav>
                <div class="flex items-center space-x-2 px-3 py-1 bg-green-50 text-green-600 rounded-full text-[10px] font-black uppercase tracking-wider border border-green-100">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
                    <span>Mémoire Synchronisée</span>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="max-w-5xl mx-auto px-6 py-8 pb-32">
        <!-- Section Inventaire -->
        <div id="section-inventory" class="space-y-8 transition-all duration-500">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div id="category-filters" class="flex space-x-2 overflow-x-auto pb-2 no-scrollbar">
                    <!-- Filtres auto -->
                </div>
                <button onclick="toggleModal('item-modal', true)" class="bg-black text-white px-8 py-3 rounded-2xl flex items-center justify-center space-x-2 hover:bg-zinc-800 transition-all active:scale-95 shadow-xl shadow-black/10">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                    <span class="font-bold uppercase tracking-widest text-xs">AJOUTER UNE PIÈCE</span>
                </button>
            </div>
            <div id="items-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-6">
                <!-- Items auto -->
            </div>
        </div>

        <!-- Section Tenues -->
        <div id="section-outfits" class="hidden space-y-8 transition-all duration-500">
            <div class="flex items-center justify-between">
                <h2 class="text-3xl font-black tracking-tight">MES LOOKS</h2>
                <button onclick="toggleModal('outfit-modal', true)" class="bg-black text-white px-8 py-3 rounded-2xl flex items-center space-x-2 hover:bg-zinc-800 transition-all active:scale-95 shadow-xl shadow-black/10">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                    <span class="font-bold uppercase tracking-widest text-xs">CRÉER UN LOOK</span>
                </button>
            </div>
            <div id="outfits-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Outfits auto -->
            </div>
        </div>
    </main>

    <!-- MOBILE TAB BAR -->
    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 md:hidden z-[60] bg-black/90 backdrop-blur-lg px-8 py-4 rounded-full flex items-center space-x-12 shadow-2xl shadow-black/40 border border-white/10 text-zinc-500">
        <button onclick="switchTab('inventory')" id="mob-inventory" class="text-white"><i data-lucide="shirt"></i></button>
        <button onclick="switchTab('outfits')" id="mob-outfits"><i data-lucide="layers"></i></button>
    </div>

    <!-- MODAL AJOUT VÊTEMENT -->
    <div id="item-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-md" onclick="toggleModal('item-modal', false)"></div>
        <div class="bg-white w-full max-w-lg rounded-[3.5rem] p-10 relative modal-enter">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-3xl font-black tracking-tighter uppercase">Nouvelle Pièce</h2>
                <button onclick="toggleModal('item-modal', false)" class="p-3 hover:bg-zinc-100 rounded-full transition-colors"><i data-lucide="x"></i></button>
            </div>
            <div class="space-y-6">
                <input type="text" id="item-name" placeholder="NOM DU VÊTEMENT..." class="w-full text-xl font-black border-b-2 border-zinc-100 pb-2 focus:border-black outline-none placeholder:text-zinc-200 uppercase">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-[10px] font-black uppercase text-zinc-400 mb-2">CATÉGORIE</label>
                        <select id="item-category" class="w-full p-4 bg-zinc-50 rounded-2xl font-bold border-none outline-none appearance-none">
                            <option value="hauts">Hauts</option>
                            <option value="bas">Bas</option>
                            <option value="chaussures">Chaussures</option>
                            <option value="accessoires">Accessoires</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-black uppercase text-zinc-400 mb-2">IMAGE (GALERIE)</label>
                        <label for="item-image-file" class="flex flex-col items-center justify-center w-full p-4 bg-zinc-50 rounded-2xl border-2 border-dashed border-zinc-200 cursor-pointer hover:bg-zinc-100 transition-colors">
                            <div class="flex flex-col items-center justify-center">
                                <i data-lucide="image-plus" class="w-6 h-6 text-zinc-400 mb-1"></i>
                                <span id="file-name-display" class="text-[8px] font-black text-zinc-400 uppercase truncate max-w-full px-2">Choisir une photo</span>
                            </div>
                            <input type="file" id="item-image-file" accept="image/*" class="hidden" onchange="handleFileSelect(event)">
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black uppercase text-zinc-400 mb-2">COULEUR</label>
                    <div id="color-picker" class="flex flex-wrap gap-3">
                        <!-- Couleurs auto -->
                    </div>
                </div>
                <button onclick="handleAddItem()" class="w-full bg-black text-white py-5 rounded-3xl font-black text-lg shadow-2xl shadow-black/10 hover:bg-zinc-800 transition-all active:scale-95 uppercase tracking-widest">Enregistrer</button>
            </div>
        </div>
    </div>

    <!-- MODAL CRÉATION TENUE (OUTFIT) -->
    <div id="outfit-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-lg" onclick="toggleModal('outfit-modal', false)"></div>
        <div class="bg-white w-full max-w-4xl rounded-[4rem] p-8 md:p-12 relative modal-enter flex flex-col max-h-[95vh]">
            <div class="flex items-center justify-between mb-4">
               <h2 class="text-xl font-black tracking-tighter uppercase opacity-30">Composer un Look</h2>
               <button onclick="toggleModal('outfit-modal', false)" class="p-4 hover:bg-zinc-100 rounded-full transition-colors"><i data-lucide="x"></i></button>
            </div>
            
            <input type="text" id="outfit-name" placeholder="NOM DU LOOK..." class="w-full text-3xl md:text-4xl font-black mb-6 border-none focus:ring-0 outline-none placeholder:text-zinc-100 uppercase tracking-tighter">
            
            <div id="outfit-selection-container" class="flex-1 overflow-y-auto pr-2 no-scrollbar space-y-8">
                <!-- Sections par catégorie auto -->
            </div>

            <div class="mt-6 pt-6 border-t border-zinc-100 flex items-center justify-between">
                <div class="flex flex-col">
                    <span id="selected-count" class="text-black font-black uppercase text-lg tracking-tighter">0 PIÈCES</span>
                    <span class="text-[9px] font-bold text-zinc-400 uppercase tracking-widest">Sélection actuelle</span>
                </div>
                <button onclick="handleAddOutfit()" class="bg-black text-white px-12 py-4 rounded-3xl font-black text-lg hover:bg-zinc-800 transition-all active:scale-95 shadow-2xl shadow-black/20 uppercase tracking-tighter">Sauvegarder Look</button>
            </div>
        </div>
    </div>

    <script>
        // --- ÉTAT INITIAL ---
        let items = JSON.parse(localStorage.getItem('wardrobe_items')) || [];
        let outfits = JSON.parse(localStorage.getItem('wardrobe_outfits')) || [];
        
        let activeTab = 'inventory';
        let selectedCategory = 'all';
        let selectedColor = '#000000';
        let currentOutfitSelection = [];
        let currentUploadedImage = null;

        const CATEGORIES = [
            { id: 'hauts', label: 'Hauts', icon: 'shirt' },
            { id: 'bas', label: 'Bas', icon: 'layers' },
            { id: 'chaussures', label: 'Chaussures', icon: 'footprints' },
            { id: 'accessoires', label: 'accessoires' }
        ];

        const COLORS = ['#000000', '#FFFFFF', '#808080', '#1D4ED8', '#B91C1C', '#15803D', '#F59E0B', '#7C3AED'];

        function saveToStorage() {
            localStorage.setItem('wardrobe_items', JSON.stringify(items));
            localStorage.setItem('wardrobe_outfits', JSON.stringify(outfits));
        }

        window.onload = () => {
            lucide.createIcons();
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
            }, 2500);
            renderFilters();
            renderColorPicker();
            renderInventory();
            renderOutfits();
        };

        // --- GESTION FICHIER ---
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                currentUploadedImage = e.target.result;
                document.getElementById('file-name-display').innerText = file.name;
                document.getElementById('file-name-display').classList.remove('text-zinc-400');
                document.getElementById('file-name-display').classList.add('text-black');
            };
            reader.readAsDataURL(file);
        }

        // --- NAVIGATION ---
        function switchTab(tab) {
            activeTab = tab;
            const isInv = tab === 'inventory';
            document.getElementById('section-inventory').classList.toggle('hidden', !isInv);
            document.getElementById('section-outfits').classList.toggle('hidden', isInv);
            
            const btns = { inv: 'btn-inventory', out: 'btn-outfits', mobInv: 'mob-inventory', mobOut: 'mob-outfits' };
            document.getElementById(btns.inv).className = isInv ? 'px-4 py-1.5 rounded-full text-xs font-bold transition-all bg-white shadow-sm text-black uppercase' : 'px-4 py-1.5 rounded-full text-xs font-bold transition-all text-zinc-500 uppercase';
            document.getElementById(btns.out).className = !isInv ? 'px-4 py-1.5 rounded-full text-xs font-bold transition-all bg-white shadow-sm text-black uppercase' : 'px-4 py-1.5 rounded-full text-xs font-bold transition-all text-zinc-500 uppercase';
            document.getElementById(btns.mobInv).classList.toggle('text-white', isInv);
            document.getElementById(btns.mobOut).classList.toggle('text-white', !isInv);
        }

        function toggleModal(id, show) {
            const modal = document.getElementById(id);
            modal.classList.toggle('hidden', !show);
            if (id === 'outfit-modal' && show) renderOutfitSelection();
            if (id === 'item-modal' && !show) {
                // Reset fields
                document.getElementById('file-name-display').innerText = "Choisir une photo";
                document.getElementById('file-name-display').className = "text-[8px] font-black text-zinc-400 uppercase truncate max-w-full px-2";
                currentUploadedImage = null;
            }
        }

        // --- RENDERING ---
        function renderFilters() {
            const container = document.getElementById('category-filters');
            container.innerHTML = `<button onclick="setCategory('all')" class="px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all whitespace-nowrap ${selectedCategory === 'all' ? 'bg-black text-white shadow-lg' : 'bg-white text-zinc-500 border border-zinc-100'}">Tous</button>`;
            CATEGORIES.forEach(cat => {
                container.innerHTML += `
                    <button onclick="setCategory('${cat.id}')" class="px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-widest flex items-center space-x-2 transition-all whitespace-nowrap ${selectedCategory === cat.id ? 'bg-black text-white shadow-lg' : 'bg-white text-zinc-500 border border-zinc-100'}">
                        <i data-lucide="${cat.icon}" class="w-3.5 h-3.5"></i>
                        <span>${cat.label}</span>
                    </button>`;
            });
            lucide.createIcons();
        }

        function renderColorPicker() {
            const container = document.getElementById('color-picker');
            container.innerHTML = COLORS.map(c => `
                <button onclick="selectedColor='${c}'; renderColorPicker();" 
                    class="w-8 h-8 rounded-full border-4 transition-all ${selectedColor === c ? 'border-black scale-110 shadow-md' : 'border-transparent'}" 
                    style="background-color: ${c}"></button>
            `).join('');
        }

        function renderInventory() {
            const container = document.getElementById('items-grid');
            const filtered = selectedCategory === 'all' ? items : items.filter(i => i.category === selectedCategory);
            
            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full py-32 flex flex-col items-center justify-center text-zinc-300"><p class="font-bold text-[10px] uppercase tracking-[0.3em]">Aucune pièce</p></div>`;
                return;
            }

            container.innerHTML = filtered.map(item => `
                <div class="group relative bg-white rounded-[2.5rem] overflow-hidden border border-zinc-50 shadow-sm hover:shadow-2xl hover:-translate-y-1 transition-all duration-500">
                    <div class="aspect-[3/4] overflow-hidden bg-zinc-50 relative">
                        <img src="${item.imageUrl}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" onerror="this.src='https://via.placeholder.com/400x600?text=${item.name}'">
                        <div class="absolute top-4 right-4 translate-x-2 opacity-0 group-hover:translate-x-0 group-hover:opacity-100 transition-all duration-300">
                            <button onclick="deleteItem('${item.id}')" class="p-2.5 bg-white/90 backdrop-blur rounded-full text-red-500 hover:bg-red-500 hover:text-white shadow-lg"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                    <div class="p-5">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-[9px] font-black uppercase text-zinc-400">${CATEGORIES.find(c => c.id === item.category)?.label}</span>
                            <div class="w-3 h-3 rounded-full border border-zinc-100" style="background-color: ${item.color}"></div>
                        </div>
                        <h3 class="font-black text-xs uppercase tracking-tight truncate">${item.name}</h3>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function renderOutfits() {
            const container = document.getElementById('outfits-grid');
            if (outfits.length === 0) {
                container.innerHTML = `<div class="col-span-full py-32 bg-zinc-50 rounded-[3rem] border-2 border-dashed border-zinc-200 flex flex-col items-center justify-center"><p class="text-zinc-400 font-bold uppercase tracking-widest text-[10px]">Aucun look sauvegardé</p></div>`;
                lucide.createIcons();
                return;
            }

            container.innerHTML = outfits.map(outfit => {
                const outfitItems = outfit.itemIds.map(id => items.find(i => i.id === id)).filter(Boolean);
                return `
                    <div class="bg-white rounded-[3.5rem] p-10 shadow-sm hover:shadow-2xl transition-all border border-zinc-50 group">
                        <div class="flex items-center justify-between mb-10">
                            <h3 class="text-3xl font-black uppercase tracking-tighter">${outfit.name}</h3>
                            <button onclick="deleteOutfit('${outfit.id}')" class="p-3 text-zinc-200 hover:text-red-500 hover:bg-red-50 rounded-full transition-all"><i data-lucide="trash-2" class="w-6 h-6"></i></button>
                        </div>
                        <div class="flex flex-wrap gap-4 mb-8">
                            ${outfitItems.map(item => `
                                <div class="w-28 h-28 rounded-[2rem] border-4 border-zinc-50 overflow-hidden bg-zinc-100 shadow-lg transform rotate-1 group-hover:rotate-0 transition-all duration-500 relative">
                                    <img src="${item.imageUrl}" class="w-full h-full object-cover">
                                    <div class="absolute bottom-0 inset-x-0 bg-black/40 backdrop-blur-sm py-1 px-2">
                                        <p class="text-[7px] text-white font-black uppercase truncate text-center">${item.name}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="flex items-center justify-between pt-6 border-t border-zinc-50">
                            <span class="text-[10px] font-black text-zinc-400 uppercase tracking-[0.2em]">${outfit.itemIds.length} PIÈCES</span>
                            <div class="flex items-center text-zinc-900 font-black text-[10px] uppercase tracking-widest">
                                ARCHIVÉ <i data-lucide="check-circle-2" class="ml-2 w-4 h-4 text-green-500"></i>
                            </div>
                        </div>
                    </div>`;
            }).join('');
            lucide.createIcons();
        }

        function renderOutfitSelection() {
            const container = document.getElementById('outfit-selection-container');
            if (items.length === 0) {
                container.innerHTML = `<div class="text-center py-20"><p class="font-black text-zinc-300 uppercase tracking-widest">Ajoutez des vêtements d'abord</p></div>`;
                return;
            }

            container.innerHTML = CATEGORIES.map(cat => {
                const catItems = items.filter(i => i.category === cat.id);
                if (catItems.length === 0) return '';

                return `
                    <div class="space-y-4">
                        <div class="flex items-center space-x-3">
                            <div class="w-8 h-8 bg-zinc-100 rounded-xl flex items-center justify-center text-black">
                                <i data-lucide="${cat.icon}" class="w-4 h-4"></i>
                            </div>
                            <h3 class="text-sm font-black uppercase tracking-tighter text-zinc-400">${cat.label}</h3>
                            <div class="flex-1 h-[1px] bg-zinc-100"></div>
                        </div>
                        <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-3">
                            ${catItems.map(item => {
                                const isSel = currentOutfitSelection.includes(item.id);
                                return `
                                    <div onclick="toggleItemInOutfit('${item.id}')" 
                                        class="cursor-pointer group relative flex flex-col space-y-1.5">
                                        <div class="relative aspect-square rounded-[1.8rem] overflow-hidden border-2 transition-all duration-300 
                                            ${isSel ? 'border-black scale-90 shadow-xl' : 'border-zinc-50 hover:border-zinc-200'}">
                                            <img src="${item.imageUrl}" class="w-full h-full object-cover">
                                            ${isSel ? `
                                                <div class="absolute inset-0 bg-black/30 flex items-center justify-center backdrop-blur-[1px]">
                                                    <div class="bg-white text-black rounded-full p-1.5 shadow-xl">
                                                        <i data-lucide="check" class="w-4 h-4"></i>
                                                    </div>
                                                </div>
                                            ` : ''}
                                        </div>
                                        <div class="px-1 text-center">
                                            <p class="text-[8px] font-bold uppercase tracking-tight truncate ${isSel ? 'text-black' : 'text-zinc-300'}">${item.name}</p>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }).join('');
            
            lucide.createIcons();
            document.getElementById('selected-count').innerText = `${currentOutfitSelection.length} ${currentOutfitSelection.length > 1 ? 'PIÈCES' : 'PIÈCE'}`;
        }

        // --- ACTIONS ---
        function setCategory(cat) {
            selectedCategory = cat;
            renderFilters();
            renderInventory();
        }

        function handleAddItem() {
            const name = document.getElementById('item-name').value;
            const category = document.getElementById('item-category').value;
            // Utilise l'image uploadée ou un placeholder par défaut
            const imageUrl = currentUploadedImage || `https://images.unsplash.com/photo-1523381210434-271e8be1f52b?q=80&w=400&auto=format&fit=crop`;

            if (!name.trim()) return;

            items.unshift({ id: Date.now().toString(), name: name.toUpperCase(), category, color: selectedColor, imageUrl });
            saveToStorage();
            renderInventory();
            toggleModal('item-modal', false);
            document.getElementById('item-name').value = '';
            document.getElementById('item-image-file').value = '';
            currentUploadedImage = null;
        }

        function deleteItem(id) {
            items = items.filter(i => i.id !== id);
            outfits = outfits.map(o => ({ ...o, itemIds: o.itemIds.filter(itemId => itemId !== id) }));
            saveToStorage();
            renderInventory();
            renderOutfits();
        }

        function toggleItemInOutfit(id) {
            if (currentOutfitSelection.includes(id)) {
                currentOutfitSelection = currentOutfitSelection.filter(i => i !== id);
            } else {
                currentOutfitSelection.push(id);
            }
            renderOutfitSelection();
        }

        function handleAddOutfit() {
            const name = document.getElementById('outfit-name').value;
            if (!name.trim() || currentOutfitSelection.length === 0) return;

            outfits.unshift({ id: Date.now().toString(), name: name.toUpperCase(), itemIds: [...currentOutfitSelection] });
            saveToStorage();
            renderOutfits();
            
            currentOutfitSelection = [];
            document.getElementById('outfit-name').value = '';
            toggleModal('outfit-modal', false);
        }

        function deleteOutfit(id) {
            outfits = outfits.filter(o => o.id !== id);
            saveToStorage();
            renderOutfits();
        }
    </script>
</body>
</html>
